l_english:
 com_topbar_configuration_button_tooltip: "Open Topbar Configuration"
 com_topbar_configuration_title: "Topbar Configuration"
 com_topbar_configuration_current: "Current Topbar"
 com_topbar_configuration_add: "Edit Topbar"
 com_topbar_configuration_add_explanation: "Add or remove topbar elements from the topbar using the buttons below."
 com_topbar_configuration_add_first_tooltip: "Add this element to first topbar."
 com_topbar_configuration_add_second_tooltip: "Add this element to second topbar."
 com_topbar_configuration_add_header_element: "Topbar Element"
 com_topbar_configuration_add_header_first: "First\nRow"
 com_topbar_configuration_add_header_second: "Second\nRow"

 # Prestige
 gg_topbar_com_prestige: "gg_topbar_com_prestige"
 gg_topbar_com_prestige_icon: ""
 gg_topbar_com_prestige_value: "@prestige!#tooltippable #tooltip:[GetPlayer.GetTooltipTag],COUNTRY_PRESTIGE_BREAKDOWN [GetPlayer.GetPrestige|v]#!#!"
 gg_topbar_com_prestige_tooltip: "$gg_com_prestige_tooltip$"
 gg_topbar_com_prestige_window: "$com_prestige_button_main$"
 gg_com_prestige_tooltip: "[concept_prestige]"

 # Power Bloc Prestige
 gg_topbar_com_bloc_prestige: "gg_topbar_com_bloc_prestige"
 gg_topbar_com_bloc_prestige_icon: ""
 gg_topbar_com_bloc_prestige_value: "@com_power_bloc![GetPlayer.GetPowerBloc.GetTotalPrestige|v]"
 gg_topbar_com_bloc_prestige_tooltip: "$gg_com_bloc_prestige_tooltip$"
 gg_topbar_com_bloc_prestige_window: "$com_bloc_prestige_button_main$"
 gg_com_bloc_prestige_tooltip: "#header [concept_prestige] of [GetPlayer.GetPowerBloc.GetName]#!\nTotal: @prestige![GetPlayer.GetPrestige|v]\n$TOOLTIP_DELIMITER$\n[GetPlayer.GetPowerBloc.GetPrestigeDesc]"

 # Power Bloc Cohesion
 gg_topbar_com_bloc_cohesion: "gg_topbar_com_bloc_cohesion"
 gg_topbar_com_bloc_cohesion_icon: ""
 gg_topbar_com_bloc_cohesion_value: "@cohesion![GetPlayer.GetPowerBloc.GetCohesion|v0]"
 gg_topbar_com_bloc_cohesion_tooltip: "$gg_com_bloc_cohesion_tooltip$"
 gg_topbar_com_bloc_cohesion_window: "$com_bloc_cohesion_button_main$"
 gg_com_bloc_cohesion_tooltip: "[concept_power_bloc_cohesion]"

 # Legitimacy
 gg_topbar_com_legitimacy: "gg_topbar_com_legitimacy"
 gg_topbar_com_legitimacy_icon: ""
 gg_topbar_com_legitimacy_value: "@legitimacy_icon!#v #tooltippable #tooltip:[GetPlayer.GetGovernmentLegitimacyLevel.GetTooltipTag],LEGITIMACY_LEVEL_ACTIVE_TOOLTIP [GetPlayer.GetGovernmentLegitimacy]#!#!#!"
 gg_topbar_com_legitimacy_tooltip: "$gg_com_legitimacy_tooltip$"
 gg_topbar_com_legitimacy_window: "$com_legitimacy_button_main$"
 gg_com_legitimacy_tooltip: "[concept_legitimacy]"

 # Innovation
 gg_topbar_com_innovation: "gg_topbar_com_innovation"
 gg_topbar_com_innovation_icon: ""
 gg_topbar_com_innovation_value: "@innovation!#v [GetPlayer.GetWeeklyInnovation|+0]#!"
 gg_topbar_com_innovation_tooltip: "$gg_com_innovation_tooltip$"
 gg_topbar_com_innovation_window: "$com_innovation_button_main$"
 gg_com_innovation_tooltip: "#header [concept_innovation]#!\n[GetPlayer.GetName] is generating #v @innovation![GetPlayer.GetWeeklyInnovation|+2]#! [concept_innovation] each week:\n[GetPlayer.GetWeeklyInnovationDesc]\n\nA maximum of @innovation![GetPlayer.GetWeeklyMaxInnovation|v2] [concept_innovation] can be invested into active research each week:\n[GetPlayer.GetWeeklyMaxInnovationDesc]\n\nAny [concept_innovation] that are unspent due to investment caps or lack of active research will increase the rate of [concept_technology_spread] to our country"

 # Companies
 gg_topbar_com_companies: "gg_topbar_com_companies"
 gg_topbar_com_companies_icon: ""
 gg_topbar_com_companies_value: "@com_company![GetPlayer.GetNumCompanies|v]/#tooltippable #tooltip:[GetPlayer.GetTooltipTag],gg_com_companies_tooltip [GetPlayer.GetMaxNumCompanies|v]#!#!"
 gg_topbar_com_companies_tooltip: "$gg_com_companies_tooltip$"
 gg_topbar_com_companies_window: "$com_companies_button_main$"
 gg_com_companies_tooltip: "[GetPlayer.GetMaxNumCompaniesDesc]"

 # Army Size
 gg_topbar_com_army_size: "gg_topbar_com_army_size"
 gg_topbar_com_army_size_icon: ""
 gg_topbar_com_army_size_value: "@battalions![GetPlayer.GetRegularBattalions|v] + [GetPlayer.CalcConscriptableBattalions|v]"
 gg_topbar_com_army_size_tooltip: "$gg_com_army_size_tooltip$"
 gg_topbar_com_army_size_window: "$com_army_size_button_main$"
 gg_com_army_size_tooltip: "#header [GetPlayer.GetAdjective] [Concept('concept_battalion', '$concept_battalions$')] and [Concept('concept_conscript_battalion','$concept_conscript_battalions$')]#!\n@battalions![GetPlayer.GetRegularBattalions|v] [Concept('concept_battalion', '$concept_battalions$')] (#v [GetPlayer.GetMobilizationRatio|0%]#!@mobilization! [Concept('concept_mobilize_battalion', '$concept_mobilize_battalion_mobilized$')])\n@conscripts![GetPlayer.GetConscriptedBattalions|v] out of [GetPlayer.CalcConscriptableBattalions|v] raised [Concept('concept_conscript_battalion','$concept_conscript_battalions$')]"

 # Navy Size
 gg_topbar_com_navy_size: "gg_topbar_com_navy_size"
 gg_topbar_com_navy_size_icon: ""
 gg_topbar_com_navy_size_value: "#variable @flotillas![GetPlayer.GetWarships|0]#!"
 gg_topbar_com_navy_size_tooltip: "$gg_com_navy_size_tooltip$"
 gg_topbar_com_navy_size_window: "$com_navy_size_button_main$"
 gg_com_navy_size_tooltip: "#header [GetPlayer.GetAdjective] [Concept('concept_flotilla','$concept_flotillas$')]#!\nCurrent: @flotillas! [GetPlayer.GetWarships|v] ([GetPlayer.GetFlotillasRanking])"