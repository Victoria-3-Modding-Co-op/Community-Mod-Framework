####---------- International Situation Localization ----------####
 concept_com_international_situation: "International Situation"
 concept_com_international_situation_desc: "$concept_com_international_situations$ are complex and long-term events that call the sustained attention of both large and small [Concept('concept_country','$concept_countries$')] alike. These can present strategic opportunities or spiral into geopolitical crises.\n\n$concept_com_international_situations$ usually involve two or more [Concept('concept_com_situation_faction','$concept_com_situation_factions$')], each with their own [concept_com_situation_leader]. Once resolved, these are removed from your $concept_journal$."
 concept_com_international_situations: "International Situations"
 concept_com_international_situation_short: "Situation"
