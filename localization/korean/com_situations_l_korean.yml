 concept_com_situation_faction_neutral_desc: "$concept_com_situation_factions_neutral$는 제3의 목표를 지닌 명확한 집단일 수도 있고, [concept_com_situation]에 관여하거나 그 영향을 받는 국가들을 설명하기 위한 포괄적 용어일 수도 있습니다. $concept_com_factions_neutral$는 해당 상황에 느슨하게 연루된 [Concept('concept_country','$concept_countries$')]로, 특정 조건이 갖춰질 경우 어느 한 진영에 가담하도록 설득될 수 있습니다."
