 concept_com_situation_desc: "$concept_com_situations$는 크고 작은 모든 [Concept('concept_country','$concept_countries$')]가 장기간에 걸쳐 지속적인 주의를 기울여야 하는 복합적인 사건입니다. 이는 전략적 기회를 제공할 수도 있고, 자칫하면 지정학적 위기로 번질 수도 있습니다.\n\n$concept_com_situations$에는 보통 둘 이상의 [Concept('concept_com_situation_faction','$concept_com_situation_factions$')]이 관여하며, 각 진영은 고유한 [concept_com_situation_leader]를 가집니다. 사안이 해결되면 $concept_journal$에서 제거됩니다."
