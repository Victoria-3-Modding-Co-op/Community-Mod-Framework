 trigger_is_party_in_com_situation: "[COUNTRY.GetName|v]是该[concept_com_situation]的参与方"
 trigger_is_party_in_com_situation_not: "[COUNTRY.GetName|v]不是该[concept_com_situation]的参与方"
 trigger_is_com_situation_side_leader: "[COUNTRY.GetName|v]是[TARGET_CHARACTER.MakeScope.Var('com_name').GetFlagName]的[concept_com_situation_leader]"
 trigger_is_com_situation_side_leader_not: "[COUNTRY.GetName|v]不是[concept_com_situation_leader]"
 has_com_situation_faction: "[CHARACTER.MakeScope.Var('com_name').GetFlagName]是[concept_com_situation]中[TARGET_CHARACTER.MakeScope.Var('com_name').GetFlagName]一方的[concept_com_situation_faction]"
 has_com_situation_faction_not: "[CHARACTER.MakeScope.Var('com_name').GetFlagName]不是[concept_com_situation]中[TARGET_CHARACTER.MakeScope.Var('com_name').GetFlagName]一方的[concept_com_situation_faction]"
 trigger_has_any_com_situation_factions: "该[concept_com_situation]至少拥有一个[concept_com_situation_faction]"
 trigger_has_any_com_situation_factions_not: "该[concept_com_situation]没有[Concept('concept_com_situation_faction', '$concept_com_situation_factions$')]"
