l_simp_chinese:
# GUI
 com_situation_vs: "vs."
 com_situation_leader: "领导者"
 com_situation_interactions: "互动"
 com_situation_victory_conditions: "胜利条件"
 com_situation_header_leader_for: "[Scope.Var('com_leader').GetCountry.GetName]是 #header [Scope.Var('com_name').GetFlagName]#! 阵营的[concept_com_situation_leader]。"
 com_situation_completion_conditions: "完成条件"
 com_situation_failure_conditions: "失败条件"
 com_situation_alternate_ending_conditions: "替代结局条件"
 com_green_checkmark_box: "@green_checkmark_box!"
 com_simple_box: "@simple_box!"
# Concepts
 concept_com_situation: "形势"
 concept_com_situations: "形势"
 concept_com_situation_desc: "$concept_com_situations$是复杂且长期的事件，需要大小[Concept('concept_country','$concept_countries$')]的持续关注。这些事件可能提供战略机遇，也可能演变成地缘政治危机。\n\n$concept_com_situations$通常涉及两个或多个[Concept('concept_com_situation_faction','$concept_com_situation_factions$')]，每个阵营都有自己的[concept_com_situation_leader]。一旦得到解决，它们将从你的$concept_journal$中移除。"
 concept_com_situation_leader: "形势领导者"
 concept_com_situation_leaders: "形势领导者"
 concept_com_leader: "领导者"
 concept_com_leaders: "领导者"
 concept_com_situation_leader_desc: "在一个[Concept('concept_com_situation_faction','$concept_com_faction$')]的每一方中，都有一个[concept_country]被视为该$concept_com_faction$的$concept_com_situation_leader$。他们通常（但不总是）是[concept_com_situation]的煽动者，并往往是推动$concept_com_situation$走向最终解决的驱动力。"
 concept_com_situation_faction: "形势派系"
 concept_com_situation_factions: "形势派系"
 concept_com_faction: "派系"
 concept_com_factions: "派系"
 concept_com_situation_faction_desc: "$concept_com_situation_factions$是对某个[concept_com_situation]的结果有共同利益的[Concept('concept_country','$concept_countries$')]。它们受其[Concept('concept_com_situation_leader','$concept_com_situation_leaders$')]（直接或间接）的引导，并可能从其最终解决中获益或受损。"
 error_no_situation_scope: "CMF：未定义 com_situation 作用域"
 error_situation_side_exists: "CMF：指定的阵营已存在"
 error_situation_side_not_exists: "CMF：指定的阵营不存在"
 concept_com_situation_faction_neutral: "中立$concept_com_situation_faction$"
 concept_com_situation_factions_neutral: "中立$concept_com_situation_factions$"
 concept_com_faction_neutral: "中立$concept_com_faction$"
 concept_com_factions_neutral: "中立$concept_com_factions$"
 concept_com_situation_countries: "参与国家"
 concept_com_situation_faction_neutral_desc: "$concept_com_situation_factions_neutral$可以是一个有着第三方目标的既定团体，也可以仅仅是一个用来描述参与或受[concept_com_situation]影响的国家的术语。$concept_com_factions_neutral$是松散参与形势的[Concept('concept_country','$concept_countries$')]，但在适当的情况下，它们可能会被拉拢加入某一方。"
# Effects
 effect_add_com_situation_journal_entry: "将 #v [TopScope.GetLocalVariable('com_name').GetFlagName]#! [concept_com_situation]添加到[THIS.GetCountry.GetName|v]的日志中"
 effect_end_com_situation: "结束该形势"
 effect_create_com_situation_side: "[TopScope.GetLocalVariable('com_name_new').GetFlagName|v]阵营在[TopScope.GetLocalVariable('com_leader_new').GetCountry.GetName|v]的领导下联合起来"
 effect_remove_com_situation_side: "[TopScope.GetLocalVariable('com_name_old').GetFlagName|v]解散"
 effect_change_com_situation_leader: "将 #v [TopScope.GetLocalVariable('com_faction_name').GetFlagName]#! 阵营的[concept_com_situation_leader]从[TopScope.GetLocalVariable('com_leader_old').GetCountry.GetName|v]更改为[TopScope.GetLocalVariable('com_leader_new').GetCountry.GetName|v]"
 effect_change_com_situation_side_name: "[TopScope.GetLocalVariable('com_name_old').GetFlagName|v]阵营将更名为[TopScope.GetLocalVariable('com_name_new').GetFlagName|v]"
 effect_create_com_situation_faction: "[TopScope.GetLocalVariable('com_faction_name').GetFlagName|v] [concept_com_situation_faction]将加入[TopScope.GetLocalVariable('com_side_name').GetFlagName|v]阵营"
 effect_remove_com_situation_faction: "[TopScope.GetLocalVariable('com_side_name').GetFlagName|v]阵营中的[TopScope.GetLocalVariable('com_faction_name').GetFlagName|v] [concept_com_situation_faction]将解散"
 effect_clear_com_situation_factions: "[TopScope.GetLocalVariable('com_side_name').GetFlagName|v]阵营上的所有[Concept('concept_com_situation_faction', '$concept_com_situation_factions$')]将解散"
 effect_clear_com_situation_factions_all: "双方阵营的所有[Concept('concept_com_situation_faction', '$concept_com_situation_factions$')]将解散"
 effect_sort_com_situation_faction: "根据给定顺序对[TopScope.GetLocalVariable('com_side_name').GetFlagName|v]阵营中[TopScope.GetLocalVariable('com_faction_name').GetFlagName|v] [concept_com_situation_faction]的所有成员进行排序。"
 effect_add_com_situation_faction_country: "[TopScope.GetLocalVariable('com_country').GetCountry.GetName|v]将加入[TopScope.GetLocalVariable('com_faction_name').GetFlagName|v] [concept_com_situation_faction]"
 effect_remove_com_situation_faction_country: "[TopScope.GetLocalVariable('com_country').GetCountry.GetName|v]将离开[TopScope.GetLocalVariable('com_faction_name').GetFlagName|v] [concept_com_situation_faction]"
 effect_remove_com_situation_faction_country_all: "[TopScope.GetLocalVariable('com_country').GetCountry.GetName|v]将不再与任何[concept_com_situation_faction]相关联"
# Triggers
